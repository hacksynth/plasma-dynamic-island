name: CI

on:
  push:
  pull_request:

jobs:
  build-plugin:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build

      # aqt 3.3.0's module metadata for Qt 6.11 is incomplete as of
      # 2026-04 — declarative not indexed. 6.10.0 is the newest version
      # fully resolvable. CI only needs enough Qt to build the plugin
      # (QDBus, Qml) and run qmllint; we do not use 6.11-only APIs.
      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtdeclarative'
          cache: true

      - name: Validate metadata.json
        run: python3 -m json.tool metadata.json > /dev/null

      - name: Validate install script syntax
        run: bash -n install.sh

      - name: Configure plugin
        run: |
          cmake -S plugin -B plugin/build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PWD}/.ci-prefix"

      - name: Build plugin
        run: cmake --build plugin/build --parallel

      - name: Install plugin module
        run: cmake --install plugin/build

      - name: Verify installed artifacts
        run: |
          module_dir="$(find .ci-prefix -path '*/qt6/qml/org/kde/plasma/dynamicisland/dbussignal' -type d -print -quit)"
          test -n "$module_dir"
          test -f "$module_dir/qmldir"
          find "$module_dir" -maxdepth 1 -type f | sort
