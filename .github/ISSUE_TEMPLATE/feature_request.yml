name: Feature request
description: Suggest an improvement to the plasmoid, install flow, or developer ergonomics.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, UI, or API you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, competing approaches, or reasons to avoid this change.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or environment details that help evaluate the request.
